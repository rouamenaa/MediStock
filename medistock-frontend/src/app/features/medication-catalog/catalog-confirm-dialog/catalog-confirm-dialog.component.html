<div
  class="confirm-overlay"
  *ngIf="open"
  (click)="onOverlayClick($event)"
  role="presentation">
  <div
    class="confirm-card"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="titleId"
    (click)="$event.stopPropagation()">
    <h3 class="confirm-title" [id]="titleId">{{ title }}</h3>
    <p class="confirm-message">{{ message }}</p>
    <div class="confirm-actions">
      <button type="button" class="btn-secondary" (click)="onCancel()">{{ cancelLabel }}</button>
      <button
        *ngIf="confirmDanger"
        type="button"
        class="btn-danger"
        (click)="onConfirm()">{{ confirmLabel }}</button>
      <button
        *ngIf="!confirmDanger"
        type="button"
        class="btn-primary"
        (click)="onConfirm()">{{ confirmLabel }}</button>
    </div>
  </div>
</div>
