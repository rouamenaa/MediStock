<div class="page-container">

  <div class="page-header">
    <h1>{{ isEdit ? '✏️ Modifier' : '➕ Ajouter' }} un Membre</h1>
    <p>{{ isEdit ? 'Modifiez les informations du membre' : 'Remplissez les informations du nouveau membre' }}</p>
  </div>

  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label>Nom complet</label>
        <input [(ngModel)]="staff.fullName" placeholder="Ex: Ahmed Ben Ali" />
      </div>
      <div class="form-group">
        <label>Rôle</label>
        <input [(ngModel)]="staff.role" placeholder="Ex: Pharmacien, Caissier..." />
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input [(ngModel)]="staff.phone" placeholder="Ex: +216 22 000 000" />
      </div>
      <div class="form-group">
        <label>Pharmacie</label>
        <select [(ngModel)]="selectedPharmacyId">
          <option value="" disabled>-- Choisir une pharmacie --</option>
          <option *ngFor="let p of pharmacies" [value]="p.id">{{ p.name }}</option>
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-primary" (click)="save()">💾 Enregistrer</button>
      <button class="btn-secondary" routerLink="/staff/list">Annuler</button>
    </div>
  </div>

</div>
