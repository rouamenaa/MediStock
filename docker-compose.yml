services:
  mysql:
    image: mysql:8.0
    container_name: medistock-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catalog_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - medistock-net

  postgres:
    image: postgres:16-alpine
    container_name: medistock-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: document_service_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medistock-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medistock-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - medistock-net

  eureka-server:
    build:
      context: ./medistock-backend/eureka-server
      dockerfile: Dockerfile
    container_name: medistock-eureka
    ports:
      - "8761:8761"
    networks:
      - medistock-net

  config-server:
    build:
      context: ./medistock-backend/Config-Server
      dockerfile: Dockerfile
    container_name: medistock-config
    depends_on:
      - eureka-server
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    ports:
      - "8888:8888"
    networks:
      - medistock-net

  api-gateway:
    build:
      context: ./medistock-backend/api-gateway01
      dockerfile: Dockerfile
    container_name: medistock-gateway
    depends_on:
      - eureka-server
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    ports:
      - "8090:8090"
    networks:
      - medistock-net

  medication-catalog-service:
    build:
      context: ./medistock-backend/medication-catalog-service
      dockerfile: Dockerfile
    container_name: medistock-medication-catalog
    depends_on:
      - mysql
      - eureka-server
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/catalog_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      DOCUMENT_SERVICE_URL: http://document-service:8091
    ports:
      - "8085:8085"
    networks:
      - medistock-net

  pharmacy-management-service:
    build:
      context: ./medistock-backend/Pharmacy-Service
      dockerfile: Dockerfile
    container_name: medistock-pharmacy-mgmt
    depends_on:
      - eureka-server
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    ports:
      - "8083:8083"
    volumes:
      - pharmacy_h2_data:/app/data
    networks:
      - medistock-net

  pharmacy-stock-service:
    build:
      context: ./medistock-backend/PharmacyStock-Service
      dockerfile: Dockerfile
    container_name: medistock-pharmacy-stock
    depends_on:
      - mysql
      - rabbitmq
      - eureka-server
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pharmacystock?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      DOCUMENT_SERVICE_URL: http://document-service:8091
    ports:
      - "8081:8081"
    networks:
      - medistock-net

  order-service:
    build:
      context: ./medistock-backend/order-Service
      dockerfile: Dockerfile
    container_name: medistock-order
    depends_on:
      - rabbitmq
      - eureka-server
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      DOCUMENT_SERVICE_URL: http://document-service:8091
    ports:
      - "8084:8084"
    networks:
      - medistock-net

  document-service:
    build:
      context: ./medistock-backend/document-service
      dockerfile: Dockerfile
    container_name: medistock-document
    depends_on:
      - postgres
      - api-gateway
    environment:
      PORT: 8091
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: document_service_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      GATEWAY_BASE_URL: http://api-gateway:8090
      EXTERNAL_TIMEOUT_MS: 5000
    ports:
      - "8091:8091"
    volumes:
      - document_uploads:/app/uploads
    networks:
      - medistock-net

  user-service:
    profiles: ["full"]
    build:
      context: ./medistock-backend/User-Service
      dockerfile: Dockerfile
    container_name: medistock-user
    depends_on:
      - mysql
      - eureka-server
      - config-server
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/user?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://localhost:8080/realms/medistock/protocol/openid-connect/certs
    ports:
      - "8082:8082"
    networks:
      - medistock-net

  frontend:
    profiles: ["ui"]
    build:
      context: ./medistock-frontend
      dockerfile: Dockerfile
    container_name: medistock-frontend
    depends_on:
      - api-gateway
      - document-service
    ports:
      - "4200:4200"
    networks:
      - medistock-net

volumes:
  mysql_data:
  postgres_data:
  pharmacy_h2_data:
  document_uploads:

networks:
  medistock-net:
    driver: bridge
