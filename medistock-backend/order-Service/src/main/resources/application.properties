# =============================================
# APPLICATION
# =============================================
spring.application.name=order-prescription-service
server.port=8084

# =============================================
# H2 DATABASE
# =============================================
spring.datasource.url=jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=123456

# H2 Console => http://localhost:8084/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ? Nťcessaire pour que data.sql soit chargť aprŤs la crťation des tables
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# =============================================
# EUREKA CLIENT
# =============================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# =============================================
# ACTUATOR
# =============================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# =============================================
# LOGGING ? ? corrigť : bon package
# =============================================
logging.level.com.esprit.microservice.orderservice=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE