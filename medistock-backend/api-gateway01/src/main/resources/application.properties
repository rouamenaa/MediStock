server.port=8090
spring.application.name=api-gateway
spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

spring.cloud.gateway.routes[0].id=pharmacy-stock-service
spring.cloud.gateway.routes[0].uri=lb://PHARMACYSTOCK-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/stock/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=order-prescription-service
spring.cloud.gateway.routes[1].uri=lb://ORDER-PRESCRIPTION-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/orders/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[3].id=pharmacy-management-service
spring.cloud.gateway.routes[3].uri=lb://PHARMACY-MANAGEMENT-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/pharmacies/**,/api/staff/**

spring.cloud.gateway.routes[4].id=medication-catalog-service
spring.cloud.gateway.routes[4].uri=lb://MEDICATION-CATALOG-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/catalog/**

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
management.endpoints.web.exposure.include=refresh,health,info
