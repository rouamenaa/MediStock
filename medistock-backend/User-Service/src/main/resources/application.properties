spring.application.name=User-Service
spring.config.import=optional:configserver:http://localhost:8888

server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/user?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

// spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/medistock

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
management.endpoints.web.exposure.include=refresh,health,info

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/medistock
