spring.application.name=PharmacyStock-Service
spring.config.import=optional:configserver:http://localhost:8888
spring.datasource.url=jdbc:mysql://localhost:3306/pharmacystock?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
server.port=8081
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
medistock.rabbitmq.exchange=medistock.exchange
medistock.rabbitmq.order-created-routing-key=order.created
medistock.rabbitmq.stock-low-routing-key=stock.low
medistock.rabbitmq.stock-order-created-queue=stock.order.created.queue
medistock.rabbitmq.stock-low-alert-queue=stock.low.alert.queue
management.endpoints.web.exposure.include=refresh,health,info
