spring.application.name=medication-catalog-service
spring.config.import=optional:configserver:http://localhost:8888

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/catalog_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.username=root
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

server.port=8085



eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
management.endpoints.web.exposure.include=refresh,health,info
document.service.url=http://localhost:8091

# RabbitMQ (topic exchange medistock.catalog). Routing keys: catalog.medication.*, catalog.category.*, catalog.active-principle.*
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
medistock.catalog.rabbit.enabled=true
medistock.catalog.rabbit.exchange=medistock.catalog

# Feign target for Pharmacy Stock integration endpoints
medistock.pharmacy-stock.base-url=http://localhost:8081
medistock.pharmacy-stock.service-name=PharmacyStock-Service
spring.cloud.openfeign.client.config.default.connectTimeout=3000
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.client.config.default.loggerLevel=basic
